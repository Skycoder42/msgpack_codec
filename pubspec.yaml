name: msgpack_codec
description: A message pack implementation for dart that works on all platforms.
version: 2.0.0+1
homepage: https://github.com/Skycoder42/msgpack_codec

environment:
  sdk: ^3.6.0

dependencies:
  meta: ^1.15.0

dev_dependencies:
  collection: ^1.19.1
  custom_lint: ^0.7.1
  dart_pre_commit: ^5.4.2
  dart_test_tools: ^6.0.2
  test: ^1.25.14

dart_pre_commit:
  pull-up-dependencies:
    allowed:
      - meta

cider:
  link_template:
    tag: https://github.com/Skycoder42/msgpack_codec/releases/tag/v%tag% # initial release link template
    diff: https://github.com/Skycoder42/msgpack_codec/compare/v%from%...v%to% # subsequent releases link template
